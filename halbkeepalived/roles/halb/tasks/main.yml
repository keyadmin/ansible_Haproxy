---
#edit file /etc/sysctl.conf
- name: Insert/Update "Match User" configuration block in /etc/ssh/sshd_config
  blockinfile:
    path: /etc/sysctl.conf
    block: |
      net.ipv4.ip_forward = 1
      net.ipv4.ip_nonlocal_bind = 1

#update repository
- name: Update apt cache
  apt: update_cache=yes

#install Haproxy 
- name: Update repo cache and install build dependencies
  apt: name={{item}} state=latest
  with_items:
    - haproxy
    - apache2
    - keepalived

#config Haproxy
- name: Define remote host in server config file
  template: src=haproxy.j2 dest=/etc/haproxy/haproxy.cfg
  tags:
    - mv_ha_config

#config keepalived
- name: Define remote host in server config file
  template: src=keepalived.j2 dest=/etc/keepalived/keepalived.conf
  tags:
    - mv_keepalived_config
